<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMING SOON | Professional Aerial Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire-red: #ff3c00;
            --fire-orange: #ff9900;
            --fire-yellow: #ffcc00;
            --bg-dark: #05020a;
            --glow: rgba(255, 60, 0, 0.6);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg-dark);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #particles-js {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
        }

        .main-container {
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 800px;
            pointer-events: none;
        }

        /* تعديلات العنوان: تصغير الخط + سطر واحد + ظلال متناسبة */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 4rem); /* تصغير الخط */
            white-space: nowrap; /* إجبار النص على البقاء في سطر واحد */
            font-weight: 900;
            margin: 0;
            letter-spacing: 5px;
            color: #000;
            text-shadow: 
                2px 2px 0px var(--fire-red), 
                4px 4px 0px var(--fire-orange), 
                6px 6px 0px var(--fire-yellow),
                8px 8px 0px rgba(255, 255, 255, 0.1); 
            animation: floatText 3s ease-in-out infinite;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        p { 
            color: #ccc; 
            margin-top: 20px; margin-bottom: 30px; 
            letter-spacing: 3px; 
            text-transform: uppercase; font-size: 0.8rem; 
        }

        .cta-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 50px;
            display: flex;
            border: 1px solid rgba(255, 60, 0, 0.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            margin-top: 10px;
            pointer-events: auto;
        }

        input {
            background: transparent; border: none; outline: none;
            color: white; padding: 10px 20px; flex-grow: 1;
            font-family: 'Poppins', sans-serif; font-size: 0.9rem;
        }

        button {
            background: linear-gradient(45deg, var(--fire-red), var(--fire-orange));
            color: #fff;
            border: none; padding: 10px 25px; border-radius: 50px;
            font-weight: 600; cursor: pointer; transition: 0.4s;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase; letter-spacing: 1px;
        }

        button:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 20px var(--fire-red);
        }

        .secure-orbit {
            position: absolute;
            width: 400px; height: 400px; /* تصغير المدار ليتناسب مع العنوان الأصغر */
            border: 1px dashed rgba(255, 60, 0, 0.1);
            border-radius: 50%;
            animation: rotateOrbit 30s linear infinite;
            z-index: 5;
        }

        .icon-item {
            position: absolute;
            width: 50px; height: 50px;
            background: rgba(5, 1, 10, 0.9);
            border: 2px solid rgba(255, 60, 0, 0.3);
            border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px;
            box-shadow: 0 0 15px var(--glow);
        }

        @keyframes rotateOrbit { 0% { transform: rotate(0deg);
} 100% { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .secure-orbit { width: 250px; height: 250px; }
            .icon-item { width: 35px; height: 35px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="secure-orbit">
        <div class="icon-item" style="top: -25px; left: 175px;">🛡️</div>
        <div class="icon-item" style="top: 35px; left: 330px;">✈️</div>
        <div class="icon-item" style="top: 175px; left: 375px;">🔒</div>
        <div class="icon-item" style="top: 315px; left: 330px;">📣</div>
        <div class="icon-item" style="top: 375px; left: 175px;">🔑</div>
        <div class="icon-item" style="top: 315px; left: 20px;">🚀</div>
        <div class="icon-item" style="top: 175px; left: -25px;">💾</div>
        <div class="icon-item" style="top: 35px; left: 20px;">☁️</div>
    </div>

    <div class="main-container">
        <h1>COMING SOON</h1>
        <p>GEET NOTIFIED WHEN IT'S REDY</p>
        
        <div class="cta-box">
            <input type="email" placeholder="Enter your email...">
            <button>NOTIFY ME</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
          "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#ffcc00" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.5, "random": false },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 150, "color": "#ff3c00", "opacity": 0.4, "width": 1 },
            "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
          },
          "interactivity": {
            "detect_on": "canvas",
            "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": { "enable": true } },
            "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 1 } } }
          },
          "retina_detect": true
        });
    </script>
</body>
</html>
